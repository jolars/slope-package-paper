name: Test Reproducibility

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  test-benchmarks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash -l {0} # Use login shell for conda

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniforge-version: latest
          activate-environment: benchopt

      - name: Install benchopt
        run: |
          pip install -U benchopt

      - name: Install benchmark_slope dependencies
        if: runner.os != 'Windows'
        run: |
          benchopt install ./benchmark_slope -y

      - name: Install benchmark_slope dependencies (Windows subset)
        if: runner.os == 'Windows'
        run: |
          benchopt install ./benchmark_slope -d Simulated -s PGD -s skglm -y

      - name: Run benchmark_slope with example config
        if: runner.os != 'Windows'
        run: |
          benchopt run ./benchmark_slope --config benchmark_slope/example_config.yml

      - name: Run benchmark_slope with Windows-safe solver subset
        if: runner.os == 'Windows'
        run: |
          benchopt run ./benchmark_slope --config benchmark_slope/example_config.yml -s PGD[prox=prox_isotonic] -s skglm

      - name: Install benchmark_slope_path dependencies
        if: runner.os != 'Windows'
        run: |
          benchopt install ./benchmark_slope_path -y

      - name: Install benchmark_slope_path dependencies (Windows subset)
        if: runner.os == 'Windows'
        run: |
          benchopt install ./benchmark_slope_path -d Simulated -s sortedl1 -y

      - name: Run benchmark_slope_path with example config
        if: runner.os != 'Windows'
        run: |
          benchopt run ./benchmark_slope_path --config benchmark_slope_path/example_config.yml

      - name: Run benchmark_slope_path with Windows-safe solver subset
        if: runner.os == 'Windows'
        run: |
          benchopt run ./benchmark_slope_path --config benchmark_slope_path/example_config.yml -s sortedl1

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}
          path: |
            benchmark_slope/outputs/
            benchmark_slope_path/outputs/
          retention-days: 30

name: Test Reproducibility

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  test-benchmarks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash -el {0} # Use login shell for conda

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniforge-version: latest
          activate-environment: benchopt

      - name: Install benchopt (Unix)
        if: runner.os != 'Windows'
        run: |
          conda activate benchopt
          BENCHOPT_DEBUG=1 pip install -U benchopt

      - name: Install benchopt (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:BENCHOPT_DEBUG = "1"
          conda activate benchopt
          pip install -U benchopt

      # - name: Install benchmark_slope dependencies
      #   run: |
      #     benchopt install ./benchmark_slope -y
      #
      # - name: Run benchmark_slope with example config
      #   run: |
      #     benchopt run ./benchmark_slope --config benchmark_slope/example_config.yml

      - name: Install benchmark_slope_path dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          conda activate benchopt
          benchopt install ./benchmark_slope_path -y --config benchmark_slope_path/example_config.yml

      - name: Install benchmark_slope_path dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:BENCHOPT_DEBUG = "1"
          $env:KMP_DUPLICATE_LIB_OK = "True"
          conda activate benchopt
          benchopt install ./benchmark_slope_path -y --config benchmark_slope_path/example_config.yml

      - name: Run benchmark_slope_path with example config (Unix)
        if: runner.os != 'Windows'
        run: |
          benchopt run ./benchmark_slope_path --config benchmark_slope_path/example_config.yml

      - name: Run benchmark_slope_path with example config (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:BENCHOPT_DEBUG = "1"
          $env:KMP_DUPLICATE_LIB_OK = "True"
          conda activate benchopt
          benchopt run ./benchmark_slope_path --config benchmark_slope_path/example_config.yml

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}
          path: |
            benchmark_slope/outputs/
            benchmark_slope_path/outputs/
          retention-days: 30

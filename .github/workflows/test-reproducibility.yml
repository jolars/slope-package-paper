name: Test Reproducibility

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggering

jobs:
  test-benchmarks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash -el {0} # Use login shell for conda

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          miniforge-version: latest
          activate-environment: benchopt

      - name: Install benchopt (Unix)
        if: runner.os != 'Windows'
        run: |
          conda activate benchopt
          pip install -U benchopt

      - name: Debug pip dependencies on macOS
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          conda activate benchopt
          python -m pip --version
          python -m pip install -vvv --no-input \
            sortedl1 \
            "git+https://github.com/jolars/slope-path" \
            libsvmdata

      - name: Install benchopt (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:BENCHOPT_DEBUG = "1"
          conda activate benchopt
          pip install -U benchopt

      # - name: Install benchmark_slope dependencies
      #   run: |
      #     benchopt install --config bench_config_single.yml -y ./benchmark_slope
      #
      # - name: Run benchmark_slope with example config
      #   run: |
      #     benchopt run ./benchmark_slope --config benchmark_slope/example_config.yml

      - name: Install benchmark_slope_path dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          conda activate benchopt
          benchopt install ./benchmark_slope_path -y --config bench_config_path.yml \
            -s sortedl1 -s PGD -s ADMM -d Simulated

      - name: Install benchmark_slope_path dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          conda activate benchopt
          benchopt install ./benchmark_slope_path -y --config bench_config_path.yml -s sortedl1 -s PGD -s ADMM -d Simulated

      - name: Run benchmark_slope_path with example config (Unix)
        if: runner.os != 'Windows'
        run: |
          benchopt run ./benchmark_slope_path --config benchmark_slope_path/example_config.yml

      - name: Run benchmark_slope_path with example config (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          conda activate benchopt
          benchopt run ./benchmark_slope_path --config benchmark_slope_path/example_config.yml

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}
          path: |
            benchmark_slope/outputs/
            benchmark_slope_path/outputs/
          retention-days: 30
